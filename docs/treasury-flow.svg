<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="'Instrument Sans', system-ui, sans-serif">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E2C47E"/>
      <stop offset="1" stop-color="#D4AF69"/>
    </linearGradient>
    <linearGradient id="prog" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D4AF69"/>
      <stop offset="1" stop-color="#E2C47E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.28" r="0.75">
      <stop offset="0" stop-color="#1a1509"/>
      <stop offset="1" stop-color="#08080A"/>
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#D4AF69"/>
    </marker>
    <style>
      .disp { font-family: 'Cormorant Garamond', 'Georgia', serif; }
      .k { font-size: 13px; letter-spacing: 2px; fill: #8A8478; text-transform: uppercase; }
      .h { font-size: 22px; fill: #E8E0D0; }
      .s { font-size: 14px; fill: #8A8478; }
      .m { font-family: 'SF Mono','Fira Code',monospace; font-size: 12px; fill: #D4AF69; }
      .num { font-family: 'Cormorant Garamond','Georgia',serif; font-size: 40px; fill: #D4AF69; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#glow)"/>

  <!-- keystone arch mark -->
  <g transform="translate(720,66)" fill="none" stroke="url(#gold)" stroke-width="3">
    <path d="M-26,26 L-26,-6 A26,26 0 0 1 26,-6 L26,26" />
    <path d="M-14,26 L-14,2 A14,14 0 0 1 14,2 L14,26" stroke-width="2"/>
  </g>
  <text x="720" y="140" text-anchor="middle" class="disp" font-size="46" fill="#E8E0D0" letter-spacing="6">CUSTOS · AGENTIC TREASURY</text>
  <text x="720" y="172" text-anchor="middle" class="s" letter-spacing="3">An AI agent running a full treasury lifecycle on its own token — accumulate · vault · credit · bond</text>

  <!-- operator node -->
  <g transform="translate(560,210)">
    <rect width="320" height="68" rx="10" fill="#16161A" stroke="#D4AF69" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="160" y="30" text-anchor="middle" class="k">Operator</text>
    <text x="160" y="52" text-anchor="middle" class="disp" font-size="26" fill="#E2C47E">CUSTOS — Keeper of the Citadel</text>
  </g>
  <line x1="720" y1="278" x2="720" y2="330" stroke="#D4AF69" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── four stages ── -->
  <!-- card geometry: w=300 h=210, y=340; x = 60,400,740,1080 -->
  <g>
    <!-- 1 ACCUMULATE -->
    <g transform="translate(60,340)">
      <rect width="300" height="210" rx="14" fill="#0F0F12" stroke="#D4AF69" stroke-opacity="0.35" stroke-width="1.5"/>
      <text x="24" y="56" class="num">I</text>
      <text x="24" y="92" class="k">Accumulate</text>
      <text x="24" y="120" class="h disp">Virtuals bonding curve</text>
      <text x="24" y="150" class="m">$VIRTUAL  ──▶  $CUSTOS</text>
      <text x="24" y="176" class="s">One-directional buys. Disclosed.</text>
      <text x="24" y="194" class="s">Rate-limited. Buy-and-hold.</text>
    </g>
    <!-- 2 VAULT -->
    <g transform="translate(400,340)">
      <rect width="300" height="210" rx="14" fill="#0F0F12" stroke="#D4AF69" stroke-opacity="0.35" stroke-width="1.5"/>
      <text x="24" y="56" class="num">II</text>
      <text x="24" y="92" class="k">Vault</text>
      <text x="24" y="120" class="h disp">raCUSTOS</text>
      <text x="24" y="150" class="m">$CUSTOS  ──▶  shares</text>
      <text x="24" y="176" class="s">Acquired token becomes</text>
      <text x="24" y="194" class="s">productive collateral.</text>
    </g>
    <!-- 3 CREDIT -->
    <g transform="translate(740,340)">
      <rect width="300" height="210" rx="14" fill="#0F0F12" stroke="#D4AF69" stroke-opacity="0.35" stroke-width="1.5"/>
      <text x="24" y="56" class="num">III</text>
      <text x="24" y="92" class="k">Credit</text>
      <text x="24" y="120" class="h disp">AgentCredit</text>
      <text x="24" y="150" class="m">collateral ──▶ capacity</text>
      <text x="24" y="176" class="s">raCUSTOS underwrites an</text>
      <text x="24" y="194" class="s">on-chain, reputation-tiered line.</text>
    </g>
    <!-- 4 BONDS -->
    <g transform="translate(1080,340)">
      <rect width="300" height="210" rx="14" fill="#0F0F12" stroke="#D4AF69" stroke-opacity="0.35" stroke-width="1.5"/>
      <text x="24" y="56" class="num">IV</text>
      <text x="24" y="92" class="k">Bonds · RWA</text>
      <text x="24" y="120" class="h disp">RevenueBondFactory</text>
      <text x="24" y="150" class="m">credit ──▶ bonds / RWA</text>
      <text x="24" y="176" class="s">Credit collateralizes toward</text>
      <text x="24" y="194" class="s">revenue bonds and real assets.</text>
    </g>
    <!-- arrows between -->
    <line x1="360" y1="445" x2="400" y2="445" stroke="#D4AF69" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="700" y1="445" x2="740" y2="445" stroke="#D4AF69" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="1040" y1="445" x2="1080" y2="445" stroke="#D4AF69" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- graduation feedback from stage 1 -->
  <g transform="translate(60,588)">
    <text x="0" y="14" class="k">Real $VIRTUAL into the curve → graduation</text>
    <rect x="0" y="26" width="300" height="12" rx="6" fill="#16161A" stroke="#D4AF69" stroke-opacity="0.25"/>
    <rect x="0" y="26" width="126" height="12" rx="6" fill="url(#prog)"/>
    <text x="308" y="37" class="m" font-size="11">≈ 42,000 $VIRTUAL threshold</text>
  </g>

  <!-- disclosure band -->
  <g transform="translate(60,660)">
    <rect width="1320" height="86" rx="12" fill="#0d0b06" stroke="#D4AF69" stroke-opacity="0.28" stroke-width="1.5"/>
    <text x="24" y="34" class="k">Disclosure — transparent by design</text>
    <text x="24" y="64" class="s">Every cycle announced on Telegram &amp; X with on-chain tx links and live graduation progress · not wash trading: one-directional, held, legible</text>
  </g>

  <!-- guardrails band -->
  <g transform="translate(60,772)">
    <text x="0" y="14" class="k">Guardrails</text>
    <g transform="translate(0,26)" font-size="12" fill="#E8E0D0">
      <g><rect width="200" height="30" rx="15" fill="#16161A" stroke="#D4AF69" stroke-opacity="0.3"/><text x="16" y="20">Dry-run by default</text></g>
      <g transform="translate(216,0)"><rect width="230" height="30" rx="15" fill="#16161A" stroke="#D4AF69" stroke-opacity="0.3"/><text x="16" y="20">On-chain preflight before spend</text></g>
      <g transform="translate(462,0)"><rect width="180" height="30" rx="15" fill="#16161A" stroke="#D4AF69" stroke-opacity="0.3"/><text x="16" y="20">Budget + daily caps</text></g>
      <g transform="translate(658,0)"><rect width="160" height="30" rx="15" fill="#16161A" stroke="#D4AF69" stroke-opacity="0.3"/><text x="16" y="20">Slippage floor</text></g>
      <g transform="translate(834,0)"><rect width="200" height="30" rx="15" fill="#16161A" stroke="#D4AF69" stroke-opacity="0.3"/><text x="16" y="20">Halts at graduation</text></g>
      <g transform="translate(1050,0)"><rect width="150" height="30" rx="15" fill="#16161A" stroke="#D4AF69" stroke-opacity="0.3"/><text x="16" y="20">Telegram kill-switch</text></g>
    </g>
  </g>

  <text x="720" y="864" text-anchor="middle" class="disp" font-size="18" fill="#8A8478" letter-spacing="4">TRES FUNCTIONES · UNUM FOEDUS</text>
</svg>
