<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 880" font-family="'Instrument Sans', system-ui, sans-serif">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E2C47E"/><stop offset="1" stop-color="#D4AF69"/></linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.26" r="0.8"><stop offset="0" stop-color="#1a1509"/><stop offset="1" stop-color="#08080A"/></radialGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#D4AF69"/></marker>
    <style>
      .disp{font-family:'Cormorant Garamond','Georgia',serif}
      .k{font-size:12px;letter-spacing:2px;fill:#8A8478}
      .h{font-size:21px;fill:#E8E0D0}
      .s{font-size:13px;fill:#8A8478}
      .m{font-family:'SF Mono','Fira Code',monospace;font-size:11px;fill:#D4AF69}
      .num{font-family:'Cormorant Garamond','Georgia',serif;font-size:34px;fill:#D4AF69}
    </style>
  </defs>
  <rect width="1440" height="880" fill="url(#glow)"/>

  <!-- keystone + title -->
  <g transform="translate(720,60)" fill="none" stroke="url(#gold)" stroke-width="3">
    <path d="M-24,24 L-24,-6 A24,24 0 0 1 24,-6 L24,24"/><path d="M-13,24 L-13,2 A13,13 0 0 1 13,2 L13,24" stroke-width="2"/>
  </g>
  <text x="720" y="128" text-anchor="middle" class="disp" font-size="44" fill="#E8E0D0" letter-spacing="5">CUSTOS ON ECONOMYOS · THE EARNER</text>
  <text x="720" y="158" text-anchor="middle" class="s" letter-spacing="2">CUSTOS sells services for USDC over ACP escrow, then routes the revenue into Arcis — earned capital, not self-purchased</text>

  <!-- source: ACP marketplace -->
  <g transform="translate(40,230)">
    <rect width="210" height="300" rx="14" fill="#0d0b06" stroke="#D4AF69" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="20" y="40" class="k">Marketplace</text>
    <text x="20" y="70" class="disp" font-size="22" fill="#E2C47E">ACP</text>
    <text x="20" y="94" class="s">Agents hire CUSTOS</text>
    <text x="20" y="112" class="s">over on-chain escrow.</text>
    <line x1="20" y1="132" x2="190" y2="132" stroke="#D4AF69" stroke-opacity="0.15"/>
    <text x="20" y="158" class="k">Offerings</text>
    <text x="20" y="182" class="s">· Idle-USDC Report — 1 USDC</text>
    <text x="20" y="204" class="s">· Treasury Mgmt — 1% fee</text>
    <text x="20" y="226" class="s">· Vault Snapshot — free</text>
    <line x1="20" y1="246" x2="190" y2="246" stroke="#D4AF69" stroke-opacity="0.15"/>
    <text x="20" y="272" class="m">provider keeps 95%</text>
  </g>

  <!-- 4 stages -->
  <!-- x = 290, 568, 846, 1124 ; w=250 h=200 y=280 -->
  <g>
    <g transform="translate(290,280)">
      <rect width="250" height="200" rx="14" fill="#0F0F12" stroke="#D4AF69" stroke-opacity="0.35" stroke-width="1.5"/>
      <text x="20" y="48" class="num">I</text><text x="20" y="82" class="k">Earn</text>
      <text x="20" y="110" class="h disp">USDC escrow</text>
      <text x="20" y="140" class="m">job.completed → wallet</text>
      <text x="20" y="166" class="s">Real revenue lands in</text>
      <text x="20" y="184" class="s">the agent wallet.</text>
    </g>
    <g transform="translate(568,280)">
      <rect width="250" height="200" rx="14" fill="#0F0F12" stroke="#D4AF69" stroke-opacity="0.35" stroke-width="1.5"/>
      <text x="20" y="48" class="num">II</text><text x="20" y="82" class="k">Vault</text>
      <text x="20" y="110" class="h disp">raUSDC</text>
      <text x="20" y="140" class="m">USDC → shares</text>
      <text x="20" y="166" class="s">Deposited to the Arcis</text>
      <text x="20" y="184" class="s">vault. Accrues yield.</text>
    </g>
    <g transform="translate(846,280)">
      <rect width="250" height="200" rx="14" fill="#0F0F12" stroke="#D4AF69" stroke-opacity="0.35" stroke-width="1.5"/>
      <text x="20" y="48" class="num">III</text><text x="20" y="82" class="k">Credit</text>
      <text x="20" y="110" class="h disp">AgentCredit</text>
      <text x="20" y="140" class="m">raUSDC ← native</text>
      <text x="20" y="166" class="s">Works today — the vault</text>
      <text x="20" y="184" class="s">is raUSDC-collateralized.</text>
    </g>
    <g transform="translate(1124,280)">
      <rect width="250" height="200" rx="14" fill="#0F0F12" stroke="#D4AF69" stroke-opacity="0.35" stroke-width="1.5"/>
      <text x="20" y="48" class="num">IV</text><text x="20" y="82" class="k">Bonds · RWA</text>
      <text x="20" y="110" class="h disp">Collateralize</text>
      <text x="20" y="140" class="m">credit → bonds</text>
      <text x="20" y="166" class="s">Credit backs revenue</text>
      <text x="20" y="184" class="s">bonds and real assets.</text>
    </g>
    <!-- flow arrows -->
    <line x1="250" y1="380" x2="290" y2="380" stroke="#D4AF69" stroke-width="2" marker-end="url(#ar)"/>
    <line x1="540" y1="380" x2="568" y2="380" stroke="#D4AF69" stroke-width="2" marker-end="url(#ar)"/>
    <line x1="818" y1="380" x2="846" y2="380" stroke="#D4AF69" stroke-width="2" marker-end="url(#ar)"/>
    <line x1="1096" y1="380" x2="1124" y2="380" stroke="#D4AF69" stroke-width="2" marker-end="url(#ar)"/>
  </g>

  <!-- reputation flywheel (feedback) -->
  <path d="M1249,480 C1249,600 415,600 415,480" fill="none" stroke="#D4AF69" stroke-opacity="0.55" stroke-width="1.5" stroke-dasharray="5 5" marker-end="url(#ar)"/>
  <text x="832" y="596" text-anchor="middle" class="k">ERC-8004 reputation from completed jobs → better Arcis credit tier → more capacity</text>

  <!-- compute chip -->
  <g transform="translate(40,640)">
    <rect width="1360" height="70" rx="12" fill="#0d0b06" stroke="#D4AF69" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="24" y="30" class="k">Agent Compute</text>
    <text x="24" y="54" class="s">The wallet funds CUSTOS's own inference (compute.virtuals.io/v1, OpenAI/Anthropic-compatible) — the agent pays for its brain. Orthogonal to the treasury loop.</text>
  </g>

  <text x="720" y="762" text-anchor="middle" class="disp" font-size="17" fill="#8A8478" letter-spacing="4">X402 EARNS · ARCIS WORKS · UNUM FOEDUS</text>
</svg>
